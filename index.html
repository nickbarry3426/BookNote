<body>

  <!-- --- SCREEN 1: THE LIBRARY SHELF DASHBOARD --- -->
  <div id="viewDashboard" class="app-view active">
    <!-- Premium Unified Header -->
    <header class="glass-header">
      <div class="header-left">
        <span class="brand-title">Axiom Notes</span>
        <div class="header-divider"></div>
        <div class="segmented-control">
          <button id="btnTabLibrary" class="segment-btn active">Library</button>
          <button id="btnTabDrive" class="segment-btn">Drive</button>
        </div>
        <div class="header-divider flex-divider"></div>
        <nav id="categoryPillBar" class="category-pills" aria-label="Genre categories"></nav>
      </div>
      
      <div class="header-right">
        <div class="search-bar-wrapper">
          <div id="iconSearch" class="icon-inline"></div>
          <input type="text" id="searchBooks" placeholder="Search books...">
        </div>
        <div class="sort-wrapper">
          <div id="iconSort" class="icon-inline"></div>
          <select id="sortBooks" aria-label="Sort books">
            <option value="modified">Recently Edited</option>
            <option value="title">Alphabetical</option>
            <option value="rating">Highest Rating</option>
          </select>
        </div>
        <button id="btnSortDriveCards" class="btn-icon-only" title="Sort: Oldest First" style="display: none;">
          <span id="iconSortDrive" class="icon-btn-svg"></span>
        </button>
        <button id="btnLibrarySettings" class="btn-icon-only" title="Global Settings">
          <span id="iconLibrarySettings" class="icon-btn-svg"></span>
        </button>
        <button id="btnCreateNotebook" class="btn-ios">
          <span id="iconPlusNotebook" class="icon-btn-svg"></span>
          <span>Notebook</span>
        </button>
        <button id="btnCreateFolder" class="btn-ios" style="display: none;">
          <span id="iconPlusFolder" class="icon-btn-svg"></span>
          <span>Folder</span>
        </button>
      </div>
    </header>
    
    <!-- Dashboard Core Layout -->
    <main class="dashboard-container">
      <!-- Book Grid display -->
      <section id="libraryShelfGrid" class="shelf-grid"></section>

      <!-- Drive View display -->
      <section id="driveContainer" class="drive-container" style="display: none;">
        <!-- Visually prominent breadcrumbs title -->
        <div id="driveBreadcrumbs" class="drive-breadcrumbs" style="display: none; align-items: center; gap: 8px;"></div>

        <!-- Folders and Subfolders Grid -->
        <div id="driveFoldersGrid" class="folders-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px;"></div>

        <!-- Stacked Quotes/Cards Section -->
        <div id="driveCardsList" class="drive-cards-list" style="display: flex; flex-direction: column; gap: 32px; width: 100%; align-items: center;"></div>
      </section>
    </main>
  </div>

  <!-- --- SCREEN 2: CANVAS NOTE WORKSPACE --- -->
  <div id="viewWorkspace" class="app-view">
    <!-- Workspace Header -->
    <header class="workspace-header">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button id="btnBackToLibrary" class="btn-ios secondary">
          <span id="iconBackToLibrary" class="icon-btn-svg"></span>
          <span>Library</span>
        </button>
        <div class="workspace-title-area">
          <span id="workspaceBookTitle" class="workspace-book-title">Notebook</span>
          <span id="workspaceBookAuthor" class="workspace-book-author">Author</span>
        </div>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button id="btnWorkspaceDetails" class="btn-ios secondary">
          <span id="iconWorkspaceSettings" class="icon-btn-svg"></span>
          <span>Book Details</span>
        </button>
      </div>
    </header>
    
    <!-- Drawing Tool Controls (Top Toolbar) -->
    <div class="workspace-toolbar">
      <div class="tool-group">
        <div id="toolPen" class="tool-btn active" title="Pen tool"></div>
        <div id="toolEraser" class="tool-btn" title="Eraser tool"></div>
      </div>
      <div class="toolbar-divider"></div>
      <div class="tool-group" id="inkPresetGroup"></div>
      <div class="toolbar-divider"></div>
      <div class="brush-width-slider">
        <span style="font-size: 11px; font-weight: 700; color: var(--text-muted);">SIZE</span>
        <input type="range" id="brushWidthSlider" min="1.0" max="6.0" step="0.5" value="2.0" aria-label="Adjust brush thickness">
      </div>
      <div class="toolbar-divider"></div>
      <div class="tool-group">
        <div id="toolUndo" class="tool-btn" title="Undo stroke"></div>
        <div id="toolRedo" class="tool-btn" title="Redo stroke"></div>
      </div>
    </div>

    <!-- Main Scrollable Stream of Ruled Sheets -->
    <main id="workspaceCardStream" class="workspace-scroller"></main>
  </div>

  <!-- --- SIDE DRAWER: ROUTE TO FOLDERS --- -->
  <div class="modal-bg" id="folderDrawer">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3>Assign to Labels</h3>
        <button id="btnFolderDrawerDone" class="btn-icon-only" aria-label="Close drawer"></button>
      </div>
      <div class="drawer-row-add">
        <input type="text" id="inpNewFolder" placeholder="e.g. Finance/Strategy or Label..." aria-label="New label path">
        <button id="btnAddFolder" class="btn-ios secondary"></button>
      </div>
      <div id="folderList" style="flex: 1; overflow-y: auto;"></div>
    </div>
  </div>

  <!-- --- SIDE DRAWER: BOOK DETAILS EDITOR --- -->
  <div class="modal-bg" id="bookDetailsDrawer">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3>Notebook Profile</h3>
        <button id="btnBookDetailsDone" class="btn-icon-only" aria-label="Close details"></button>
      </div>
      
      <!-- Book Cover Image Preview & Uploader -->
      <div class="input-block">
        <label>Notebook Cover</label>
        <div id="editCoverPreview" style="width: 100%; height: 160px; background: #fafafc; border: 2px dashed var(--line-ruled); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--transition-fast);"></div>
        <input type="file" id="editCoverUploader" style="display: none;" accept="image/png, image/jpeg">
      </div>

      <div class="input-block">
        <label for="editBookTitle">Title</label>
        <input type="text" id="editBookTitle" placeholder="Book title...">
      </div>
      
      <div class="input-block">
        <label for="editBookAuthor">Author</label>
        <input type="text" id="editBookAuthor" placeholder="Author name...">
      </div>
      
      <div class="input-block">
        <label for="editBookGenre">Category</label>
        <select id="editBookGenre"></select>
      </div>
      
      <div class="input-block">
        <label>Notebook Theme Customization</label>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <span style="font-size: 11px; font-weight: 600; color: var(--text-muted);">ACCENT/ARROW</span>
            <input type="color" id="editBookThemeFontColor" value="#007aff" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: var(--radius-sm); cursor: pointer;" aria-label="Accent/Arrow Color">
          </div>
          <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
            <span style="font-size: 11px; font-weight: 600; color: var(--text-muted);">PAPER BG</span>
            <input type="color" id="editBookThemeBgColor" value="#ffffff" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: var(--radius-sm); cursor: pointer;" aria-label="Paper Background Color">
          </div>
        </div>
      </div>
      
      <div class="input-block">
        <label for="editBookRatingSlider">Personal Rating</label>
        <div class="rating-slider-container" style="display: flex; align-items: center; gap: 12px; margin-top: 8px;">
          <input type="range" id="editBookRatingSlider" min="1" max="100" value="85" style="flex: 1;" aria-label="Book Rating Slider">
          <span id="editBookRatingVal" style="font-weight: 700; width: 56px; text-align: right;">85/100</span>
        </div>
      </div>



      <div style="margin-top: auto; display: flex; flex-direction: column; gap: 12px;">
        <button id="btnDeleteBook" class="btn-ios danger" style="width: 100%; padding: 12px;">Delete Notebook</button>
      </div>
    </div>
  </div>

  <!-- --- SIDE DRAWER: GLOBAL APP SETTINGS --- -->
  <div class="modal-bg" id="globalSettingsDrawer">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3>App Settings</h3>
        <button id="btnGlobalSettingsDone" class="btn-icon-only" aria-label="Close settings"></button>
      </div>
      
      <div class="input-block">
        <label>Manage Categories</label>
        <div class="genre-manager-wrapper" style="border: 1px solid var(--line-ruled); border-radius: var(--radius-sm); padding: 8px; background: #ffffff;">
          <div id="globalGenresManagerList" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px;"></div>
          <div style="display: flex; gap: 6px;">
            <input type="text" id="inpGlobalNewGenre" placeholder="New Category..." style="flex: 1; font-size: 13px; padding: 8px; border: 1px solid var(--line-ruled); border-radius: var(--radius-sm); outline: none;" aria-label="New category name">
            <button id="btnGlobalAddGenre" class="btn-ios secondary" style="font-size: 12px; padding: 8px 16px; white-space: nowrap;">Add</button>
          </div>
        </div>
      </div>


    </div>
  </div>

  <!-- --- CUSTOM PROMPT MODAL --- -->
  <div class="modal-bg centered" id="customPromptModal">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3 id="promptTitle">Prompt</h3>
        <button id="btnPromptClose" class="btn-icon-only" aria-label="Close"></button>
      </div>
      <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
        <p id="promptMessage" style="font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0;"></p>
        <input type="text" id="promptInput" style="width: 100%; padding: 8px 12px; border: 1px solid var(--line-ruled); border-radius: var(--radius-sm); font-size: 14px; outline: none;">
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button id="btnPromptCancel" class="btn-ios secondary" style="flex: 1;">Cancel</button>
          <button id="btnPromptConfirm" class="btn-ios" style="flex: 1;">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- --- CUSTOM CONFIRM MODAL --- -->
  <div class="modal-bg centered" id="customConfirmModal">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3 id="confirmTitle">Confirm</h3>
        <button id="btnConfirmClose" class="btn-icon-only" aria-label="Close"></button>
      </div>
      <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
        <p id="confirmMessage" style="font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0;"></p>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button id="btnConfirmCancel" class="btn-ios secondary" style="flex: 1;">Cancel</button>
          <button id="btnConfirmConfirm" class="btn-ios" style="flex: 1;">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- --- CREATE NOTEBOOK MODAL --- -->
  <div class="modal-bg centered" id="createNotebookModal">
    <div class="drawer-panel" onclick="event.stopPropagation()">
      <div class="drawer-header">
        <h3>Create New Notebook</h3>
        <button id="btnCreateNotebookClose" class="btn-icon-only" aria-label="Close"></button>
      </div>
      <div style="padding: 20px; display: flex; flex-direction: column; gap: 16px;">
        <div class="input-block">
          <label for="newBookTitle">Notebook Title</label>
          <input type="text" id="newBookTitle" placeholder="e.g. Range, Grit...">
        </div>
        <div class="input-block">
          <label for="newBookAuthor">Author (Optional)</label>
          <input type="text" id="newBookAuthor" placeholder="e.g. David Epstein...">
        </div>
        <div class="input-block">
          <label for="newBookGenre">Category</label>
          <select id="newBookGenre" style="width: 100%; height: 36px; border: 1px solid var(--line-ruled); border-radius: var(--radius-sm); padding: 0 8px; outline: none; background: #ffffff;"></select>
        </div>
        <div class="input-block">
          <label>Theme Customization</label>
          <div style="display: flex; gap: 12px; margin-top: 8px;">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
              <span style="font-size: 11px; font-weight: 600; color: var(--text-muted);">ACCENT/ARROW</span>
              <input type="color" id="newBookThemeFontColor" value="#007aff" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: var(--radius-sm); cursor: pointer;" aria-label="Accent/Arrow Color">
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
              <span style="font-size: 11px; font-weight: 600; color: var(--text-muted);">PAPER BG</span>
              <input type="color" id="newBookThemeBgColor" value="#ffffff" style="width: 100%; height: 36px; padding: 0; border: none; border-radius: var(--radius-sm); cursor: pointer;" aria-label="Paper Background Color">
            </div>
          </div>
        </div>
        <button id="btnCreateNotebookSubmit" class="btn-ios" style="width: 100%; padding: 12px; margin-top: 8px;">Create Notebook</button>
      </div>
    </div>
  </div>

  <!-- Core App JS Bootstrapper Module -->
</body>
</html>
